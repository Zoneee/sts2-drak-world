name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装依赖
        run: echo "根据实际项目填写安装命令"
      - name: 运行测试
        run: echo "根据实际项目填写测试命令"

  lint:
    name: 代码规范检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装依赖
        run: echo "根据实际项目填写安装命令"
      - name: 运行 Lint
        run: echo "根据实际项目填写 lint 命令"
